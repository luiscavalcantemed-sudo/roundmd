<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RoundMD V1 | Clinical Assistant</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="RoundMD">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f6e56">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="rmd-print-header">
  <div class="ph-logo">RoundMD <small id="rmd-ph-subtitle">Clinical Note</small></div>
  <div class="ph-meta" id="rmd-ph-meta"></div>
</div>

<div class="topbar">
  <div class="topbar-row">
    <div class="topbar-title">
      <svg class="icon-svg" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
      <span id="app-title">RoundMD <span style="font-size:10px;font-weight:400;opacity:0.6;">V1</span></span>
    </div>
    
    <div class="topbar-controls">
      <div class="privacy-shield" id="privacy-shield-btn" onclick="togglePrivacyShield()" role="button" aria-label="Toggle privacy mode" tabindex="0">
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
        <span id="privacy-text">Privacy Mode</span>
      </div>
      <button class="btn-topbar" onclick="toggleLang()" id="lang-toggle" aria-label="Toggle language">PT</button>
      <button class="btn-topbar" id="timer-btn" onclick="toggleTimer()" aria-label="Encounter timer" title="Encounter timer" style="font-variant-numeric:tabular-nums;">
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61l1.42-1.42c-.43-.51-.9-.99-1.41-1.41l-1.42 1.42C16.07 4.74 14.12 4 12 4c-4.97 0-9 4.03-9 9s4.02 9 9 9 9-4.03 9-9c0-2.12-.74-4.07-1.97-5.61zM12 20c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
        <span id="timer-display">0:00</span>
      </button>
      <div class="completion-badge" aria-label="Completion progress" role="status">
        <span id="completion-badge-val">0%</span>
        <div class="completion-tooltip" id="completion-tooltip"></div>
      </div>
    </div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
</div>

<div class="app-layout">
  <aside class="sidebar-nav">
    <div class="drafts-bar">
      <div class="drafts-bar-top-row">
        <button class="drafts-btn drafts-btn-manager" onclick="openDraftsModal()" id="drafts-btn-lbl">Patients Manager</button>
        <div class="drafts-bar-actions">
          <button class="drafts-btn" style="background: var(--border); color: var(--text); padding: 5px 10px; font-weight:bold;" onclick="createNewPatient()" id="btn-clear-sidebar-lbl" title="Create New Patient">+ New</button>
          <button class="drafts-btn" id="btn-save-visit-lbl" style="background: var(--primary); padding: 5px 10px; font-weight:bold;display:flex;align-items:center;justify-content:center;gap:4px;" onclick="saveVisitAndNotify()" title="Save Visit to Timeline"><svg class="lucide-svg" style="width:13px;height:13px;" viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg> <span id="btn-save-visit-txt">Save</span></button>
          <button class="drafts-btn" id="btn-timeline-lbl" style="background: var(--accent); padding: 5px 10px; font-weight:bold; color:white;display:flex;align-items:center;justify-content:center;gap:4px;" onclick="openLongitudinalModal()" title="Patient Timeline"><svg class="lucide-svg" style="width:13px;height:13px;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> <span id="btn-timeline-txt">History</span></button>
          <button class="drafts-btn" id="btn-evolution-lbl" style="background: var(--warn); padding: 5px 10px; font-weight:bold; color:white;display:flex;align-items:center;justify-content:center;gap:4px;" onclick="newDailyEvolution()" title="New Daily Evolution"><svg class="lucide-svg" style="width:13px;height:13px;" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg> <span id="btn-evolution-txt">Evolução</span></button>
        </div>
      </div>
      <div class="drafts-bar-left">
        <svg class="icon-svg" style="width:14px;height:14px;flex-shrink:0;" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        <span id="drafts-status" style="font-size:11px; word-break:break-word; overflow-wrap:break-word;">Active Patient: Draft</span>
      </div>
    </div>
    
    <div class="nav-scroll" id="nav-tabs"></div>
  </aside>
  
  <main class="main-content">
    <div id="sections-container"></div>
  </main>
</div>

<div id="app-nav-footer" class="nav-footer" style="display:none;"></div>

<!-- CORE MODAL DIALOG (PE AND ROS CHIPS) -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header-row">
      <div class="modal-title" id="modal-title">System Analysis</div>
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
    </div>
    
    <!-- Modal search box for rapid filtering -->
    <div class="modal-search">
      <input type="text" id="modal-search-input" placeholder="Type to filter clinical signs..." oninput="filterModalChips()">
    </div>
    
    <div id="modal-chips" class="abnormal-chips"></div>
    
    <label id="modal-note-label">Add details:</label>
    <div class="dictate-wrap">
      <textarea id="modal-textarea" rows="3"></textarea>
      <button class="btn-dictate" id="modal-dictate-btn" onclick="startDictation('modal-textarea')" title="Voice dictation">
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
      </button>
    </div>
    
    <button class="btn-primary" style="margin-top:16px;" onclick="saveModal()" id="modal-save-btn">Save Findings</button>
  </div>
</div>

<!-- PATIENTS MANAGER DRAFTS MODAL -->
<div class="modal-overlay" id="drafts-modal" onclick="closeDraftsModal(event)">
  <div class="modal" onclick="event.stopPropagation()" style="max-height: 80vh;">
    <div class="modal-header-row">
      <div class="modal-title" id="drafts-modal-title">Local Patient Records (Offline)</div>
      <button class="modal-close" onclick="closeDraftsModalBtn()">✕</button>
    </div>
    
    <div class="modal-search">
      <input type="text" id="drafts-search-input" placeholder="Search by name or MRN..." oninput="renderDraftsList()">
    </div>
    
    <div id="drafts-list-container" style="max-height:40vh; overflow-y:auto; margin-bottom:16px;"></div>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
      <button class="btn-primary btn-accent" onclick="exportDrafts()" id="btn-export-lbl">Export Backups</button>
      <button class="btn-primary" onclick="triggerImport()" id="btn-import-lbl">Import Backups</button>
    </div>
    <input type="file" id="import-file-input" style="display:none;" onchange="importDrafts(event)" accept=".json">
    
    <button class="btn-primary btn-danger" style="margin-top:12px;" onclick="createNewPatient()" id="btn-new-pt-lbl">Create New Patient</button>
  </div>
</div>

<script src="app.js"></script>
<!-- LONGITUDINAL MODAL -->
<div id="longitudinal-modal" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,0.55);backdrop-filter:blur(4px);z-index:9998;align-items:flex-start;justify-content:center;padding-top:60px;overflow-y:auto;">
  <div style="background:var(--surface-solid);border-radius:var(--radius);width:90%;max-width:600px;box-shadow:0 20px 40px rgba(0,0,0,0.2);animation:slideUp 0.2s cubic-bezier(0.16,1,0.3,1);">
    <div style="display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);">
      <span id="longitudinal-title" style="font-size:16px;font-weight:800;color:var(--text);flex:1;display:flex;align-items:center;gap:8px;"><svg class="lucide-svg" style="width:16px;height:16px;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> <span id="longitudinal-title-txt">Patient Timeline</span></span>
      <button onclick="closeLongitudinalModal()" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-muted);">✕</button>
    </div>
    <div id="longitudinal-content" style="padding:16px 20px;max-height:65vh;overflow-y:auto;"></div>
    <div style="padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;">
      <button id="longitudinal-save-btn" class="btn-primary" onclick="saveVisitAndNotify();renderLongitudinalModal();" style="display:flex;align-items:center;gap:6px;"><svg class="lucide-svg" style="width:14px;height:14px;" viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg> <span id="longitudinal-save-txt">Save Current Visit</span></button>
      <button id="longitudinal-close-btn" onclick="closeLongitudinalModal()" style="padding:10px 18px;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;font-size:14px;cursor:pointer;">Close</button>
    </div>
  </div>
</div>
<style>
  #longitudinal-modal.open { display: flex; }
</style>

<!-- CUSTOM CONFIRM DIALOG -->
<div id="confirm-overlay">
  <div id="confirm-box">
    <div id="confirm-msg"></div>
    <div class="confirm-btns">
      <button class="confirm-btn-cancel" id="confirm-cancel-btn"></button>
      <button class="confirm-btn-ok" id="confirm-ok-btn"></button>
    </div>
  </div>
</div>


<!-- AUTOSAVE TOAST -->
<div class="toast" id="save-toast" role="status" aria-live="polite">
  <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
  <span id="toast-msg">Saved</span>
</div>
</body>
</html>
